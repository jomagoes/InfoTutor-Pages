<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Enrique</title>
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f4da.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #202124;
        }
        .container { text-align: center; padding: 20px; max-width: 400px; }
        .logo-placeholder { width: 64px; height: 64px; margin-bottom: 24px; border-radius: 12px; }
        h2 { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
        p { font-size: 14px; color: #5f6368; margin-bottom: 32px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 40px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-fallback {
            display: inline-block; padding: 10px 24px; font-size: 14px; font-weight: 500;
            color: #1a73e8; text-decoration: none; border: 1px solid #dadce0; border-radius: 4px;
        }
        .btn-fallback:hover { background-color: #f1f3f4; }
    </style>
</head>
<body>

    <div class="container">
        <img class="logo-placeholder" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f4da.png" alt="Logo">
        <h2>Conectando con el centro...</h2>
        <p>Validando acceso corporativo para <strong>Centro de Enrique</strong>.</p>
        <div class="spinner"></div>
        <a href="https://script.google.com/a/murciaeduca.es/macros/s/AKfycbwEDUTRDflfyoFADEmZSdOI2-7vXeiAoJoE0Pw7j2_LK8cmmeWQAWypgw1mYsK4fpp0xw/exec" target="_top" class="btn-fallback">Acceder directamente</a>
    </div>

    <script>
        
        window.top.location.href = "https:\/\/script.google.com\/a\/murciaeduca.es\/macros\/s\/AKfycbwEDUTRDflfyoFADEmZSdOI2-7vXeiAoJoE0Pw7j2_LK8cmmeWQAWypgw1mYsK4fpp0xw\/exec";
    </script>
</body>
</html>
