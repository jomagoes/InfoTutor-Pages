<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redireccionando...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #202124;
        }
        .loading-box { text-align: center; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 16px; font-weight: 500; color: #5f6368; }
    </style>
</head>
<body>

    <div class="loading-box">
        <div class="spinner"></div>
        <p>Optimizando dirección de acceso...</p>
    </div>

    <script>
        // 1. Capturamos la URL completa que el usuario escribió en el navegador
        let urlOriginal = window.location.href;
        
        // 2. Analizamos si en alguna parte de la ruta (sea como sea) está la palabra "infotutor-pages"
        if (urlOriginal.toLowerCase().includes("infotutor-pages")) {
            
            // Expresión regular con la bandera 'i' (case-insensitive) para cazar cualquier combinación:
            // infotutor-pages, INFOTUTOR-PAGES, Infotutor-Pages, etc.
            let expresionRegular = /infotutor-pages/i;
            
            // Reemplazamos la coincidencia exacta manteniendo intacto todo lo que vaya detrás (parámetros, subcarpetas...)
            let urlCorregida = urlOriginal.replace(expresionRegular, "InfoTutor-Pages");
            
            // Realizamos la redirección inmediata sustituyendo el historial para que no se quede atrapado al dar "Atrás"
            window.location.replace(urlCorregida);
            
        } else {
            // Si el error 404 es real (es decir, han escrito una página que de verdad no existe dentro de tu repo)
            // puedes redirigirlos directamente a la página principal correcta de tu proyecto
            window.location.replace("https://jomagoes.github.io/InfoTutor-Pages/");
        }
    </script>
</body>
</html>
