<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de pruebas</title>
    <link rel="icon" type="image/x-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f4da.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f8f9fa;
        }
         
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background-color: #f8f9fa;
            transition: opacity 0.3s ease;
        }
        .container { text-align: center; padding: 20px; max-width: 400px; }
        .logo-placeholder { width: 64px; height: 64px; margin-bottom: 24px; border-radius: 12px; }
        h2 { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: #202124; }
        p { font-size: 14px; color: #5f6368; margin-bottom: 32px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e8eaed;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
         
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">
        <div class="container">
            <img class="logo-placeholder" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f4da.png" alt="Logo">
            <h2>Conectando con el centro...</h2>
            <p>Cargando la plataforma de <strong>Centro de pruebas</strong>.</p>
            <div class="spinner"></div>
        </div>
    </div>

    <iframe src="https://script.google.com/a/murciaeduca.es/macros/s/AKfycbxqaAhBrLMTSiUI4aw-WRHp1g9gFEq5VPnOq10mLnuceAY6UKVISw65CGpC_hkkdA-wlA/exec" onload="ocultarCarga()">
        <iframe>contenido redirigido</iframe>
    </iframe>

    <script>
        
        function ocultarCarga() {
            const pantallaCarga = document.getElementById('loading');
            pantallaCarga.style.opacity = '0';
            setTimeout(() => pantallaCarga.style.display = 'none', 300);
        }
    </script>
</body>
</html>
